name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install

      - name: Inject Team ID
        run: |
          # Inject the Apple Team ID from secrets into the config file
          sed -i '' "s/__APPLE_DEVELOP_TEAM__/${{ secrets.APPLE_DEVELOPMENT_TEAM }}/g" src-tauri/tauri.conf.json

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_CERTIFICATE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Manual Install Provisioning Profile
        id: install_profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | tr -d '\r\n ' | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Ting.mobileprovision
          # Extract UUID using a more robust regex for Apple's standard format
          PROFILE_UUID=$(grep -a -oE "[a-fA-F0-9]{8}-([a-fA-F0-9]{4}-){3}[a-fA-F0-9]{12}" ~/Library/MobileDevice/Provisioning\ Profiles/Ting.mobileprovision | head -n 1)
          if [ -z "$PROFILE_UUID" ]; then
            echo "ERROR: Could not extract UUID from provisioning profile."
            exit 1
          fi
          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "Installed Profile UUID: $PROFILE_UUID"

      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri ios init
          fi

      - name: Patch Xcode Project for Manual Signing
        run: |
          PBXPROJ="src-tauri/gen/apple/ting.xcodeproj/project.pbxproj"
          echo "Patching $PBXPROJ..."
          # Force Manual Provisioning Style
          sed -i '' 's/ProvisioningStyle = Automatic;/ProvisioningStyle = Manual;/g' "$PBXPROJ"
          # Force Manual Code Sign Style
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PBXPROJ"
          # Inject the Profile UUID and Team ID
          sed -i '' "s/PROVISIONING_PROFILE_SPECIFIER = \"\";/PROVISIONING_PROFILE_SPECIFIER = \"${{ steps.install_profile.outputs.profile_uuid }}\";/g" "$PBXPROJ"
          sed -i '' "s/DEVELOPMENT_TEAM = \"\";/DEVELOPMENT_TEAM = \"${{ secrets.APPLE_DEVELOPMENT_TEAM }}\";/g" "$PBXPROJ"
          # Ensure Team ID is set in the build settings
          sed -i '' "s/DevelopmentTeam = \"\";/DevelopmentTeam = \"${{ secrets.APPLE_DEVELOPMENT_TEAM }}\";/g" "$PBXPROJ"
          echo "Patching complete."

      - name: Build iOS App (Release)
        run: |
          npm run tauri ios build -- --target aarch64 -- \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution"
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: src-tauri/gen/apple/build/Build/Products/Release-iphoneos/*.app