name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install

      - name: Inject Team ID
        run: |
          # Inject the Apple Team ID from secrets into the config file
          sed -i '' "s/__APPLE_DEVELOP_TEAM__/${{ secrets.APPLE_DEVELOPMENT_TEAM }}/g" src-tauri/tauri.conf.json

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_CERTIFICATE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Manual Install Provisioning Profile
        id: install_profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/Ting.mobileprovision
          # Extract UUID for manual signing
          PROFILE_UUID=$(grep -aA1 "UUID" ~/Library/MobileDevice/Provisioning\ Profiles/Ting.mobileprovision | grep -oE "[-A-Z0-9]{36}")
          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "Installed Profile UUID: $PROFILE_UUID"

      - name: Check Tauri version
        run: npm run tauri -- --version

      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri ios init
          fi

      - name: Build iOS App (Manual Sign Release)
        # We force manual signing to avoid 'No Accounts' errors in CI
        run: |
          npm run tauri ios build -- --target aarch64 -- \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.install_profile.outputs.profile_uuid }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_DEVELOPMENT_TEAM }}"
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: src-tauri/gen/apple/build/Build/Products/Release-iphoneos/*.app