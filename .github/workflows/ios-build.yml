name: iOS Build

on:
  workflow_dispatch:
#  push:
#    branches: [ master ]
#  pull_request:
#    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Cache Rust/Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-ios-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ios-

      - name: Install dependencies
        run: npm install

      - name: Inject Team ID
        run: |
          sed -i '' "s/__APPLE_DEVELOP_TEAM__/${{ secrets.APPLE_DEVELOPMENT_TEAM }}/g" src-tauri/tauri.conf.json

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_CERTIFICATE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Manual Install Provisioning Profile
        id: install_profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | tr -d '\r\n ' | base64 --decode > profile_temp.mobileprovision
          PROFILE_UUID=$(grep -a -oE "[a-fA-F0-9]{8}-([a-fA-F0-9]{4}-){3}[a-fA-F0-9]{12}" profile_temp.mobileprovision | head -n 1)
          cp profile_temp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "Installed Profile UUID: $PROFILE_UUID"

      - name: Initialize iOS project
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri ios init
          fi

      - name: Create Smart xcodebuild Shim
        run: |
          # The Smart Shim: Handles BOTH build and export-archive
          sudo cat <<EOF > /usr/local/bin/xcodebuild
          #!/bin/bash
          ARGS=()
          FOR_EXPORT=false
          FOR_COMPILATION=false
          
          # 1. Parse arguments
          for arg in "\$@"; do
              if [[ "\$arg" == "-exportArchive" ]]; then FOR_EXPORT=true; fi
              if [[ "\$arg" == "build" || "\$arg" == "archive" ]]; then FOR_COMPILATION=true; fi
              if [[ "\$arg" == "-allowProvisioningUpdates" ]]; then continue; fi
              ARGS+=("\$arg")
          done
          
          # 2. Handle Compilation/Archive step
          if [ "\$FOR_COMPILATION" = true ]; then
            echo "Injecting Compilation Signing Flags..."
            /usr/bin/xcodebuild "\${ARGS[@]}" \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="${{ steps.install_profile.outputs.profile_uuid }}" \
              PROVISIONING_PROFILE="${{ steps.install_profile.outputs.profile_uuid }}" \
              DEVELOPMENT_TEAM="${{ secrets.APPLE_DEVELOPMENT_TEAM }}" \
              AD_HOC_CODE_SIGNING_ALLOWED=YES
          
          # 3. Handle Export step (Intersept and patch Plist)
          elif [ "\$FOR_EXPORT" = true ]; then
            OPTS_PLIST=""
            for i in "\${!ARGS[@]}"; do
                if [[ "\${ARGS[\$i]}" == "-exportOptionsPlist" ]]; then
                    OPTS_PLIST="\${ARGS[\$((i+1))]}"
                fi
            done
            if [ -n "\$OPTS_PLIST" ]; then
               echo "Tauri found. Patching ExportOptions.plist at \$OPTS_PLIST"
               plutil -replace method -string app-store "\$OPTS_PLIST" || true
               plutil -replace signingStyle -string manual "\$OPTS_PLIST" || true
               plutil -replace teamID -string "${{ secrets.APPLE_DEVELOPMENT_TEAM }}" "\$OPTS_PLIST" || true
               # Inject provisioningProfiles sub-dictionary
               plutil -insert provisioningProfiles -xml "<dict><key>org.ting.app</key><string>${{ steps.install_profile.outputs.profile_uuid }}</string></dict>" "\$OPTS_PLIST" || true
            fi
            /usr/bin/xcodebuild "\${ARGS[@]}"
          
          # 4. Transparent pass for everything else
          else
            /usr/bin/xcodebuild "\${ARGS[@]}"
          fi
          EOF
          sudo chmod +x /usr/local/bin/xcodebuild

      - name: Build and Export iOS App
        run: |
          # Use our Smart Shim to bypass ALL Tauri/Xcode CI limitations
          export PATH="/usr/local/bin:$PATH"
          npm run tauri ios build -- --target aarch64
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-ipa
          path: src-tauri/gen/apple/build/arm64/*.ipa

      - name: Deliver build to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: src-tauri/gen/apple/build/arm64/ting.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
