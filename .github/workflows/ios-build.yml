name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install

      - name: Inject Team ID
        run: |
          # Inject the Apple Team ID from secrets into the config file
          sed -i '' "s/__APPLE_DEVELOP_TEAM__/${{ secrets.APPLE_DEVELOPMENT_TEAM }}/g" src-tauri/tauri.conf.json

      - name: Check Tauri version
        run: npm run tauri -- --version

      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/ios" ]; then
            npm run tauri ios init
          fi

      - name: Build iOS App (Unsigned Debug)
        run: npm run tauri ios build -- --debug
        env:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: ""
          AD_HOC_CODE_SIGNING_ALLOWED: YES

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: src-tauri/gen/ios/build/Build/Products/Debug-iphoneos/*.app