name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install

      - name: Inject Team ID
        run: |
          # Inject the Apple Team ID from secrets into the config file
          sed -i '' "s/__APPLE_DEVELOP_TEAM__/${{ secrets.APPLE_DEVELOPMENT_TEAM }}/g" src-tauri/tauri.conf.json

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_CERTIFICATE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Manual Install Provisioning Profile
        id: install_profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | tr -d '\r\n ' | base64 --decode > profile_temp.mobileprovision
          
          # Use the robust regex we know works
          PROFILE_UUID=$(grep -a -oE "[a-fA-F0-9]{8}-([a-fA-F0-9]{4}-){3}[a-fA-F0-9]{12}" profile_temp.mobileprovision | head -n 1)
          
          if [ -z "$PROFILE_UUID" ]; then
            echo "ERROR: Could not extract UUID."
            exit 1
          fi
          
          # Rename to the standard {UUID}.mobileprovision format
          cp profile_temp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "Installed Profile UUID: $PROFILE_UUID"

      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri ios init
          fi

      - name: Create xcodebuild Injection Shim
        run: |
          # The ultimate shim: Filter BAD params AND Inject GOOD params
          sudo cat <<EOF > /usr/local/bin/xcodebuild
          #!/bin/bash
          ARGS=()
          for arg in "\$@"; do
              if [[ "\$arg" != "-allowProvisioningUpdates" ]]; then
                  ARGS+=("\$arg")
              fi
          done
          
          # Call the real xcodebuild with INJECTED signing flags
          /usr/bin/xcodebuild "\${ARGS[@]}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.install_profile.outputs.profile_uuid }}" \
            PROVISIONING_PROFILE="${{ steps.install_profile.outputs.profile_uuid }}" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_DEVELOPMENT_TEAM }}" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          EOF
          sudo chmod +x /usr/local/bin/xcodebuild
          echo "xcodebuild Injection Shim created."

      - name: Build iOS App (Release)
        run: |
          # Use our injection shim to bypass Tauri's CLI limitations
          export PATH="/usr/local/bin:$PATH"
          npm run tauri ios build -- --target aarch64
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: src-tauri/gen/apple/build/Build/Products/Release-iphoneos/*.app