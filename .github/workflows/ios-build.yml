name: iOS Build

on:
  workflow_dispatch:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios, x86_64-apple-ios, aarch64-apple-ios-sim

      - name: Install dependencies
        run: npm install

      - name: Inject Team ID
        run: |
          # Inject the Apple Team ID from secrets into the config file
          sed -i '' "s/__APPLE_DEVELOP_TEAM__/${{ secrets.APPLE_DEVELOPMENT_TEAM }}/g" src-tauri/tauri.conf.json

      - name: Import Apple Certificates
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.P12_CERTIFICATE }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Manual Install Provisioning Profile
        id: install_profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.PROVISIONING_PROFILE }}" | tr -d '\r\n ' | base64 --decode > profile_temp.mobileprovision
          # Extract UUID for manual signing
          PROFILE_UUID=$(grep -a -oE "[a-fA-F0-9]{8}-([a-fA-F0-9]{4}-){3}[a-fA-F0-9]{12}" profile_temp.mobileprovision | head -n 1)
          if [ -z "$PROFILE_UUID" ]; then
            echo "ERROR: Could not extract UUID from provisioning profile."
            exit 1
          fi
          # Rename to the standard {UUID}.mobileprovision format that Xcode looks for
          cp profile_temp.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$PROFILE_UUID.mobileprovision
          echo "profile_uuid=$PROFILE_UUID" >> $GITHUB_OUTPUT
          echo "Installed Profile UUID: $PROFILE_UUID"

      - name: Initialize iOS project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/apple" ]; then
            npm run tauri ios init
          fi

      - name: Create Signing XCConfig
        run: |
          cat <<EOF > signing.xcconfig
          CODE_SIGN_STYLE = Manual
          CODE_SIGN_IDENTITY = Apple Distribution
          PROVISIONING_PROFILE_SPECIFIER = ${{ steps.install_profile.outputs.profile_uuid }}
          DEVELOPMENT_TEAM = ${{ secrets.APPLE_DEVELOPMENT_TEAM }}
          AD_HOC_CODE_SIGNING_ALLOWED = YES
          EOF
          echo "Created signing.xcconfig:"
          cat signing.xcconfig

      - name: Create xcodebuild Shim
        run: |
          # Create a shim script that filters out the -allowProvisioningUpdates flag
          sudo cat <<EOF > /usr/local/bin/xcodebuild
          #!/bin/bash
          # Filter out -allowProvisioningUpdates which causes 'No Accounts' error in CI
          ARGS=()
          for arg in "\$@"; do
              if [[ "\$arg" != "-allowProvisioningUpdates" ]]; then
                  ARGS+=("\$arg")
              fi
          done
          # Call the real xcodebuild
          /usr/bin/xcodebuild "\${ARGS[@]}"
          EOF
          sudo chmod +x /usr/local/bin/xcodebuild
          echo "xcodebuild Shim created at /usr/local/bin/xcodebuild"

      - name: Build iOS App (Release)
        run: |
          # Use our shim to bypass Tauri's hardcoded params
          export PATH="/usr/local/bin:$PATH"
          npm run tauri ios build -- --target aarch64 -- \
            -xcconfig $(pwd)/signing.xcconfig \
            CODE_SIGN_IDENTITY="Apple Distribution"
        env:
          APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_DEVELOPMENT_TEAM }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: src-tauri/gen/apple/build/Build/Products/Release-iphoneos/*.app